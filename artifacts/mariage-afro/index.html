<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#68191e" />

    <!-- Security headers (Task #57) are emitted as real HTTP headers by
         artifacts/mariage-afro/server.mjs (helmet) in production: CSP, HSTS,
         X-Frame-Options, X-Content-Type-Options, Referrer-Policy,
         Permissions-Policy, COOP, CORP. We intentionally do NOT mirror them
         here as <meta> tags so there is a single source of truth and dev
         (vite) keeps a permissive CSP that doesn't fight HMR. -->

    <title>Mariage Afro — Mariages Afro &amp; Mixtes en Belgique</title>
    <meta name="description" content="Mariage Afro est la première plateforme premium dédiée aux mariages afro et mixtes en Belgique. Trouvez vos prestataires et organisez votre grand jour." />
    <link rel="canonical" href="https://www.mariage-afro.com/" />

    <!-- hreflang multilingue FR/NL/EN — accepts ?lang= or /<lang>/ prefix -->
    <link rel="alternate" hreflang="fr-BE" href="https://www.mariage-afro.com/?lang=fr" />
    <link rel="alternate" hreflang="nl-BE" href="https://www.mariage-afro.com/?lang=nl" />
    <link rel="alternate" hreflang="en-GB" href="https://www.mariage-afro.com/?lang=en" />
    <link rel="alternate" hreflang="x-default" href="https://www.mariage-afro.com/" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mariage Afro" />
    <meta property="og:title" content="Mariage Afro — Mariages Afro &amp; Mixtes en Belgique" />
    <meta property="og:description" content="La première plateforme premium dédiée aux mariages afro et mixtes en Belgique. Trouvez vos prestataires et organisez votre grand jour." />
    <meta property="og:url" content="https://www.mariage-afro.com/" />
    <meta property="og:image" content="https://www.mariage-afro.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_BE" />
    <meta property="og:locale:alternate" content="nl_BE" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mariage Afro — Mariages Afro &amp; Mixtes en Belgique" />
    <meta name="twitter:description" content="La première plateforme premium dédiée aux mariages afro et mixtes en Belgique." />
    <meta name="twitter:image" content="https://www.mariage-afro.com/opengraph.jpg" />

    <!-- Favicons (full pack — Task #56) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#68191e" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Slimmed font weights (only those actually used) for faster LCP, font-display=swap to avoid FOIT -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    >
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      >
    </noscript>

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Mariage Afro",
      "url": "https://www.mariage-afro.com/",
      "logo": "https://www.mariage-afro.com/logo.svg",
      "description": "La première plateforme premium dédiée aux mariages afro et mixtes en Belgique.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "BE",
        "addressLocality": "Bruxelles"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "info@mariage-afro.com",
        "availableLanguage": ["French", "Dutch", "English"]
      },
      "areaServed": "BE",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mariage Afro",
      "url": "https://www.mariage-afro.com/",
      "inLanguage": ["fr-BE", "nl-BE", "en"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.mariage-afro.com/partenaires?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
