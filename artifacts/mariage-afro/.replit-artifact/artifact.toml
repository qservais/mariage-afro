kind = "web"
previewPath = "/"
title = "Mariage Afro"
version = "1.0.0"
id = "artifacts/mariage-afro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21974

[services.development]
run = "pnpm --filter @workspace/mariage-afro run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/mariage-afro", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# Express server with helmet for HTTP security headers (Task #57).
# Replaces the previous static serve so HSTS / X-Frame-Options /
# X-Content-Type-Options / CSP / Referrer-Policy / Permissions-Policy can
# be emitted as real HTTP headers (meta tags only cover a subset).
args = ["node", "artifacts/mariage-afro/server.mjs"]

[services.production.run.env]
NODE_ENV = "production"

[services.env]
PORT = "21974"
BASE_PATH = "/"
